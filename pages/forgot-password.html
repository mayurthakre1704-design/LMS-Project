<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LearnGreen — Forgot Password</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body{background:var(--green-pale);}
    .center-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px;}
    .auth-card{background:white;border-radius:20px;padding:44px 48px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);text-align:center;}
    .fp-icon{width:68px;height:68px;background:var(--green-pale);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--green-main);margin:0 auto 22px;}
    .steps-bar{display:flex;gap:6px;margin-bottom:26px;}
    .step-dot{flex:1;height:4px;border-radius:3px;background:var(--gray-border);transition:background 0.3s;}
    .step-dot.done{background:var(--green-main);}
    .otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px;}
    .otp-box{width:46px;text-align:center;padding:13px 6px;font-size:19px;font-weight:700;}
  </style>
</head>
<body>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg"></span></div>
<nav class="navbar">
  <a class="navbar-logo" href="login.html"><div class="logo-box">🎓</div>Learn<span>Green</span></a>
  <div class="navbar-right"><a href="login.html" class="btn btn-outline">Back to Login</a></div>
</nav>
<div class="center-wrap">
  <div class="auth-card fade-up">
    <div class="fp-icon"><i class="fas fa-key"></i></div>
    <h2 style="font-size:24px;font-weight:800;color:var(--green-dark);margin-bottom:6px;">Forgot Password?</h2>
    <p style="font-size:14px;color:var(--gray-text);margin-bottom:22px;">Enter your email and we'll send a reset code.</p>
    <div class="steps-bar">
      <div class="step-dot done" id="fp-dot1"></div>
      <div class="step-dot"      id="fp-dot2"></div>
      <div class="step-dot"      id="fp-dot3"></div>
    </div>
    <!-- Step 1 -->
    <div id="fp-step1">
      <div class="form-group" style="text-align:left">
        <label>Email Address</label>
        <div class="input-icon-wrap"><i class="fas fa-envelope"></i><input type="email" class="form-input" placeholder="your@email.com" id="fp-email"/></div>
      </div>
      <button class="btn btn-primary btn-block" onclick="fpSendCode()">Send Reset Code <i class="fas fa-paper-plane"></i></button>
    </div>
    <!-- Step 2 -->
    <div id="fp-step2" style="display:none">
      <p style="font-size:13px;color:var(--gray-text);background:var(--green-pale);border-radius:9px;padding:12px;margin-bottom:18px;text-align:left;">Code sent to <b id="fp-email-display"></b></p>
      <div class="otp-row">
        <input type="text" maxlength="1" class="form-input otp-box"/>
        <input type="text" maxlength="1" class="form-input otp-box"/>
        <input type="text" maxlength="1" class="form-input otp-box"/>
        <input type="text" maxlength="1" class="form-input otp-box"/>
        <input type="text" maxlength="1" class="form-input otp-box"/>
        <input type="text" maxlength="1" class="form-input otp-box"/>
      </div>
      <button class="btn btn-primary btn-block" onclick="fpVerify()">Verify Code</button>
      <p style="font-size:13px;margin-top:14px;color:var(--gray-text);">Didn't get it? <a href="#" style="color:var(--green-main);font-weight:600;" onclick="showToast('Code resent!')">Resend</a></p>
    </div>
    <!-- Step 3 -->
    <div id="fp-step3" style="display:none">
      <div class="form-group" style="text-align:left">
        <label>New Password</label>
        <div class="input-icon-wrap"><i class="fas fa-lock"></i><input type="password" class="form-input" placeholder="Min 8 characters"/></div>
      </div>
      <div class="form-group" style="text-align:left">
        <label>Confirm New Password</label>
        <div class="input-icon-wrap"><i class="fas fa-lock"></i><input type="password" class="form-input" placeholder="Repeat password"/></div>
      </div>
      <button class="btn btn-primary btn-block" onclick="fpReset()">Reset Password ✓</button>
    </div>
    <p style="margin-top:22px;font-size:13px;"><a href="login.html" style="color:var(--green-main);font-weight:600;"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
